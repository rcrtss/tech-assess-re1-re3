listener:
  pull_now_endpoint:
    host: "127.0.0.1"
    port: 8000

  poll_interval_minutes: 1
  lookback_window_minutes: 5
  liveness_threshold_minutes: 10

  timeout_seconds: 5
  max_retries: 3
  health_probe_interval_seconds: 10

  storage_path: "./data/listener.db"

  primary_service:
    name: "Agency A"
    url: "http://127.0.0.1:8001"

  secondary_service:
    name: "Agency B"
    url: "http://127.0.0.1:8002"
